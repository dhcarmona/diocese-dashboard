#Spring Webbapp configurations
spring.application.name=DioceseDashboard
server.forward-headers-strategy=NATIVE

#DB config
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRESQL_PORT}/${SPRING_DATABASE_NAME}
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.connectionTimeout=20000
spring.datasource.hikari.maximumPoolSize=5
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

#Bootstrap admin configuration (set via environment or external config)
dashboard.bootstrap-admin.enabled=${DASHBOARD_BOOTSTRAP_ADMIN_ENABLED:false}
dashboard.bootstrap-admin.username=${DASHBOARD_BOOTSTRAP_ADMIN_USERNAME:}
dashboard.bootstrap-admin.password=${DASHBOARD_BOOTSTRAP_ADMIN_PASSWORD:}

#Other
logging.level.root=INFO
logging.level.web=INFO

#Base URL used by scheduled link creation to build WhatsApp notification links.
#Must be set to the public-facing URL in production (e.g. https://yourdomain.com).
app.base-url=${APP_BASE_URL:http://localhost:5173}

#Meta Cloud API WhatsApp configuration
#Set WHATSAPP_ACCESS_TOKEN and WHATSAPP_PHONE_NUMBER_ID to send messages directly through Meta.
#When template names are configured below, the app sends those approved templates outside
#the 24-hour customer service window; otherwise it falls back to free-form text messages.
whatsapp.meta.base-url=${WHATSAPP_META_BASE_URL:https://graph.facebook.com}
whatsapp.meta.api-version=${WHATSAPP_META_API_VERSION:v25.0}
whatsapp.meta.access-token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.meta.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.meta.language-code.es=${WHATSAPP_TEMPLATE_LANGUAGE_CODE_ES:es}
whatsapp.meta.templates.otp-authentication.fallback=${WHATSAPP_TEMPLATE_OTP_AUTHENTICATION:}
whatsapp.meta.templates.otp-authentication.es=${WHATSAPP_TEMPLATE_OTP_AUTHENTICATION_ES:}
whatsapp.meta.templates.reporter-welcome.fallback=${WHATSAPP_TEMPLATE_REPORTER_WELCOME:}
whatsapp.meta.templates.reporter-welcome.es=${WHATSAPP_TEMPLATE_REPORTER_WELCOME_ES:reporter_welcome_es_v2}
whatsapp.meta.templates.reporter-link.fallback=${WHATSAPP_TEMPLATE_REPORTER_LINK:}
whatsapp.meta.templates.reporter-link.es=${WHATSAPP_TEMPLATE_REPORTER_LINK_ES:reporter_link_es}
whatsapp.meta.templates.report-submitted.fallback=${WHATSAPP_TEMPLATE_REPORT_SUBMITTED:}
whatsapp.meta.templates.report-submitted.es=${WHATSAPP_TEMPLATE_REPORT_SUBMITTED_ES:report_submitted_es}
whatsapp.meta.templates.report-updated.fallback=${WHATSAPP_TEMPLATE_REPORT_UPDATED:}
whatsapp.meta.templates.report-updated.es=${WHATSAPP_TEMPLATE_REPORT_UPDATED_ES:report_updated_es}
whatsapp.meta.templates.report-deleted.fallback=${WHATSAPP_TEMPLATE_REPORT_DELETED:}
whatsapp.meta.templates.report-deleted.es=${WHATSAPP_TEMPLATE_REPORT_DELETED_ES:report_deleted_es}
whatsapp.meta.templates.reporter-login-link.fallback=${WHATSAPP_TEMPLATE_REPORTER_LOGIN_LINK:}
whatsapp.meta.templates.reporter-login-link.es=${WHATSAPP_TEMPLATE_REPORTER_LOGIN_LINK_ES:reporter_login_link_es}
