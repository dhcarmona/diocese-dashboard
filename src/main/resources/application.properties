#Spring Webbapp configurations
spring.application.name=DioceseDashboard


#DB config
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRESQL_PORT}/${SPRING_DATABASE_NAME}
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.connectionTimeout=20000
spring.datasource.hikari.maximumPoolSize=5
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

#Bootstrap admin configuration (set via environment or external config)
dashboard.bootstrap-admin.enabled=${DASHBOARD_BOOTSTRAP_ADMIN_ENABLED:false}
dashboard.bootstrap-admin.username=${DASHBOARD_BOOTSTRAP_ADMIN_USERNAME:}
dashboard.bootstrap-admin.password=${DASHBOARD_BOOTSTRAP_ADMIN_PASSWORD:}

#Other
logging.level.web=INFO

#Twilio WhatsApp configuration
#To use the sandbox during development, the recipient must first send
#"join <sandbox-keyword>" to the sandbox number (+14155238886) on WhatsApp.
#Replace TWILIO_WHATSAPP_FROM with your own number once it is provisioned.
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM:+14155238886}
